spring:
  application:
    name: ciyex
  cloud:
    vault:
      enabled: true
      uri: ${VAULT_URI:https://vault.apps-stage.us-east.in.hinisoft.com}
      authentication: TOKEN
      token: ${VAULT_TOKEN:}
      kv:
        enabled: true
        backend: secret
        default-context: ciyex
        application-name: ciyex
        backend-version: 2
      client:
        ssl:
          verification-mode: SELF_SIGNED
      lease:
        initial-retry-attempts: 3
        initial-retry-interval: 1000
        max-retry-attempts: 5
        retry-interval: 1000
    config:
      uri: ${CONFIG_URI:https://config.apps-prod.us-east.in.hinisoft.com}
      username: ${CONFIG_USERNAME:stage}
      password: ${CONFIG_PASSWORD:ceffDD0qWy2gMHycsolsQBPi}
      fail-fast: false
      allow-override: true
      override-none: true
      retry:
        initial-interval: 1000
        max-attempts: 3
        max-interval: 2000
        multiplier: 1.1
