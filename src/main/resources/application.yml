spring:
  application:
    name: ciyex

  datasource:
    url: jdbc:postgresql://localhost:5432/ciyexdb
    username: postgres
    password: mypassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.hbm2ddl.create_namespaces: true
      hibernate.default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://aran-stg.zpoa.com/realms/master
          jwk-set-uri: https://aran-stg.zpoa.com/realms/master/protocol/openid-connect/certs

  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB

jwt:
  secret: Um7I76bdvjLLGMWPPYYZr4jYXSNKpHOtIQS8Ktg8C4w=
  expiration: 31557600000  # 1 year

keycloak:
  enabled: true
  auth-server-url: https://aran-stg.zpoa.com
  realm: master
  resource: ciyex-app
  credentials:
    secret: LgDl38nUg6leUfB9DCG5LDglC75bxpOp
  admin:
    username: aran-admin
    password: Kc@2024!Secure#Pass

cors:
  allowed-origins: http://localhost:3000

logging:
  level:
    root: info
    org.springframework.security.oauth2.server.resource: debug
    org.springframework.security.authentication: debug
    com.qiaben.ciyex.audit: debug

ciyex:
  env: local
  schema:
    name: public

  audit:
    enabled: true
    log-successful-operations: true
    log-failed-operations: true
    auto-log-controller-methods: true
    auto-log-service-methods: true
    capture-detailed-info: true
    max-description-length: 500
    max-details-length: 10000
    anonymize-user-info: false
    retention-period-days: 2555
    archive-old-logs: true
    batch-size: 100
    async-logging: false
    async-thread-pool-size: 5
    validate-integrity: true
    log-ip-addresses: true
    log-user-agent: true
    log-session-info: true
    enable-alerts: true
    failed-login-alert-threshold: 5
    failed-login-time-window-minutes: 15
    enable-compliance-monitoring: true
    generate-daily-reports: true
    enable-tamper-detection: true
    use-digital-signatures: false

    excluded-endpoints:
      - /health
      - /metrics
      - /info
      - /actuator
      - /api/audit

    excluded-user-roles:
      - SYSTEM
      - HEALTH_CHECK
