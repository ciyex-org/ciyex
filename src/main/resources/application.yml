spring:
  application:
    name: ciyex
  datasource:
    url: jdbc:postgresql://localhost:5432/ciyexdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 1GB        # ⬅️ individual file size
      max-request-size: 1GB     # ⬅️ total request size

jwt:
  secret: Um7I76bdvjLLGMWPPYYZr4jYXSNKpHOtIQS8Ktg8C4w=
  expiration: 31557600000

cors:
  allowed-origins: http://localhost:3000

logging:
  level:
    root: info
