spring:
  application:
    name: ciyex

  datasource:
    url: jdbc:mysql://localhost:3306/ciyexdb
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQLDialect


openemr:
  api-url: https://stg.qiaben-emr.com/apis/default/api
  oauth:
    private-key-path: classpath:oaprivate.key
    client-id: local-ciyex-client
    audience: http://stg.qiaben-emr.com/oauth2/default/token
    kid: qia-client-key-1
    token-url: https://stg.qiaben-emr.com/oauth2/default/token
    scope: patient/Patient.read

jwt:
  secret: Um7I76bdvjLLGMWPPYYZr4jYXSNKpHOtIQS8Ktg8C4w=
  expiration: 31557600000

cors:
  allowed-origins: http://localhost:3000

logging:
  level:
    root: debug