spring:
  application:
    name: ciyex
  datasource:
    url: jdbc:postgresql://localhost:5432/ciyexdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.hbm2ddl.create_namespaces: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://aran-stg.zpoa.com/realms/master
          jwk-set-uri: https://aran-stg.zpoa.com/realms/master/protocol/openid-connect/certs
  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB
jwt:
  secret: Um7I76bdvjLLGMWPPYYZr4jYXSNKpHOtIQS8Ktg8C4w=
  expiration: ${JWT_EXPIRATION:1800000}
keycloak:
  enabled: ${KEYCLOAK_ENABLED:true}
  auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL:https://aran-stg.zpoa.com}
  realm: ${KEYCLOAK_REALM:master}
  resource: ${KEYCLOAK_RESOURCE:ciyex-app}
  credentials:
    secret: ${KEYCLOAK_CLIENT_SECRET:LgDl38nUg6leUfB9DCG5LDglC75bxpOp}
  admin:
    username: ${KEYCLOAK_ADMIN_USERNAME:aran-admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:Kc@2024!Secure#Pass}
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://stg.ciyex.com}
logging:
  level:
    root: info
    com.qiaben.ciyex.audit: debug
ciyex:
  env: ${CIYEX_ENV:local}
  schema:
    name: ${CIYEX_SCHEMA_NAME:public}
  audit:
    enabled: true
    log-successful-operations: true
    log-failed-operations: true
    auto-log-controller-methods: true
    auto-log-service-methods: true
    capture-detailed-info: true
    max-description-length: 500
    max-details-length: 10000
    anonymize-user-info: false
    retention-period-days: 2555
    archive-old-logs: true
    batch-size: 100
    async-logging: false
    async-thread-pool-size: 5
    validate-integrity: true
    log-ip-addresses: true
    log-user-agent: true
    log-session-info: true
    enable-alerts: true
    failed-login-alert-threshold: 5
    failed-login-time-window-minutes: 15
    enable-compliance-monitoring: true
    generate-daily-reports: true
    enable-tamper-detection: true
    use-digital-signatures: false
    excluded-endpoints:
      - /health
      - /metrics
      - /info
      - /actuator
      - /api/audit
    excluded-user-roles:
      - SYSTEM
      - HEALTH_CHECK
