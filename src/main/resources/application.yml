spring.application.name: ciyex

openemr:
  api-url: https://stg.qiaben-emr.com/apis/default/api
  oauth:
    private-key-path: classpath:oaprivate.key
    client-id: local-ciyex-client
    audience: http://stg.qiaben-emr.com/oauth2/default/token
    kid: qia-client-key-1
    token-url: https://stg.qiaben-emr.com/oauth2/default/token
    scope: patient/Patient.read
logging:
  level:
    root: info
