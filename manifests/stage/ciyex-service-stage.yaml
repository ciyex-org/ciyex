apiVersion: v1
kind: Service
metadata:
  name: ciyex-app-stage
spec:
  type: ClusterIP
  ports:
    - name: spring
      port: 8080
      targetPort: 8080
    - name: ehr-ui
      port: 3000
      targetPort: 3000
    - name: portal-ui
      port: 3001
      targetPort: 3001
    - name: admin-ui
      port: 3002
      targetPort: 3002
  selector:
    app: ciyex-app-stage