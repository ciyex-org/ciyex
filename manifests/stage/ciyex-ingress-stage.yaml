apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ciyex-ingress-stage
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
    - host: stg.ciyex.com
      http:
        paths:
          - pathType: Prefix
            path: /api(/|$)(.*)
            backend:
              service:
                name: ciyex-app-stage
                port:
                  number: 8080
          - pathType: Prefix
            path: /?(.*)
            backend:
              service:
                name: ciyex-app-stage
                port:
                  number: 3000
