plugins {
	id 'java'
	id 'org.springframework.boot' version '3.5.3'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.qiaben'
version = '0.0.1-SNAPSHOT'




java {
/*	toolchain {
		languageVersion = JavaLanguageVersion.current()
	}*/
}

repositories {
	mavenCentral()
}

dependencies {
	// Spring Boot and security
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation 'org.springframework.boot:spring-boot-starter-security'

	// https://mvnrepository.com/artifact/ca.uhn.hapi.fhir/hapi-fhir-structures-r4
	implementation("ca.uhn.hapi.fhir:hapi-fhir-structures-r4:8.2.1")

	implementation 'ca.uhn.hapi.fhir:hapi-fhir-base:8.2.1'
	implementation 'ca.uhn.hapi.fhir:hapi-fhir-client:8.2.1'
	implementation 'ca.uhn.hapi.fhir:hapi-fhir-structures-r4:8.2.1'

	// postgres + Lombok
	implementation 'org.postgresql:postgresql'
	implementation 'org.projectlombok:lombok:1.18.38'
	annotationProcessor 'org.projectlombok:lombok:1.18.38'

	implementation 'com.fasterxml.jackson.core:jackson-databind' // required for parser

	// Validation
	implementation 'jakarta.validation:jakarta.validation-api:3.0.2'

	implementation("org.projectlombok:lombok:1.18.38")

	implementation("io.jsonwebtoken:jjwt-api:0.12.6")
	runtimeOnly("io.jsonwebtoken:jjwt-impl:0.12.6")
	runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'

	implementation("org.bouncycastle:bcprov-jdk18on:1.81")
	implementation("commons-io:commons-io:2.19.0")
	annotationProcessor 'org.projectlombok:lombok:1.18.38'


	// Other
	implementation 'org.bouncycastle:bcprov-jdk18on:1.81'
	implementation 'commons-io:commons-io:2.19.0'
	implementation("com.github.ben-manes.caffeine:caffeine:3.2.2")

	// Testing
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}


tasks.named('test') {
	useJUnitPlatform()
}

