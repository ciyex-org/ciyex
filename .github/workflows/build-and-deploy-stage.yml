name: Build & Deploy Ciyex App Stage

# Triggers: run for pull requests targeting main and pushes to main
on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]

env:
  IMAGE_NAME: ciyex-app-stage
  ACR_NAME: hinikubestageacr.azurecr.io
  CLUSTER_NAME: hiniKubeStage
  RESOURCE_GROUP: hiniKubeStage-rg
  VERSION: v1.0.${{ github.run_number }}

jobs:
  pr-build:
    name: PR Build - Validate Docker Image
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Build Docker image (no push)
        run: |
          docker build --build-arg ENVIRONMENT=stage -t $ACR_NAME/$IMAGE_NAME:$VERSION .
          echo "✅ PR image build successful: $ACR_NAME/$IMAGE_NAME:$VERSION"

  build-and-deploy:
    name: Deploy to AKS (Staging)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_STAGE }}

      - name: Azure ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and Push Docker Image
        run: |
          docker build --build-arg ENVIRONMENT=stage -t $ACR_NAME/$IMAGE_NAME:$VERSION .
          docker push $ACR_NAME/$IMAGE_NAME:$VERSION

      - name: Set AKS context
        uses: azure/aks-set-context@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_STAGE }}
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}

      - name: Update image in kustomization
        run: |
          cd k8s/overlays/stage
          kustomize edit set image IMAGE_URL:IMAGE_TAG=${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}

      - name: Deploy to AKS
        run: kubectl apply -k k8s/overlays/stage

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/ciyex-app-stage --timeout=3m
          kubectl get pods -l app=ciyex-app -o wide

      - name: Notify deployment
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Ciyex Backend Stage deployment successful"
          else
            echo "❌ Ciyex Backend Stage deployment failed"
          fi

  notify:
    name: Notify Team
    if: always()
    runs-on: ubuntu-latest
    needs: [build-and-deploy]

    steps:
      - name: Determine deployment status
        id: status
        run: |
          if [ "${{ needs.build-and-deploy.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          fi

      - name: Send Microsoft Teams notification
        run: |
          TEAMS_WEBHOOK="${{ secrets.TEAMS_WEBHOOK_URL }}"
          if [ -z "$TEAMS_WEBHOOK" ]; then
            echo "⚠️ TEAMS_WEBHOOK_URL secret not configured, skipping notification"
            exit 0
          fi
          
          STATUS_COLOR="28a745"
          if [ "${{ steps.status.outputs.status }}" == "failure" ]; then
            STATUS_COLOR="dc3545"
          fi
          
          curl -H "Content-Type: application/json" -d '{
            "@type": "MessageCard",
            "@context": "https://schema.org/extensions",
            "themeColor": "'"$STATUS_COLOR"'",
            "summary": "Ciyex Backend Stage Deployment ${{ steps.status.outputs.status }}",
            "sections": [{
              "activityTitle": "${{ steps.status.outputs.emoji }} Ciyex Backend Stage Deployment ${{ steps.status.outputs.status }}",
              "activitySubtitle": "Version ${{ env.VERSION }}",
              "facts": [
                {
                  "name": "Environment:",
                  "value": "Stage"
                },
                {
                  "name": "Version:",
                  "value": "${{ env.VERSION }}"
                },
                {
                  "name": "Image:",
                  "value": "${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}"
                },
                {
                  "name": "Cluster:",
                  "value": "${{ env.CLUSTER_NAME }}"
                },
                {
                  "name": "Deployed by:",
                  "value": "${{ github.actor }}"
                },
                {
                  "name": "Commit:",
                  "value": "${{ github.sha }}"
                },
                {
                  "name": "URL:",
                  "value": "https://stg.ciyex.com/api"
                }
              ],
              "markdown": true
            }],
            "potentialAction": [{
              "@type": "OpenUri",
              "name": "View Workflow",
              "targets": [{
                "os": "default",
                "uri": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }]
            },
            {
              "@type": "OpenUri",
              "name": "View API",
              "targets": [{
                "os": "default",
                "uri": "https://stg.ciyex.com/api"
              }]
            }]
          }' "$TEAMS_WEBHOOK"
