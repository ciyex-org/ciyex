name: Build & Push Ciyex App to Prod Registry

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'build'
        type: choice
        options:
          - build
          - promote-to-rc
          - promote-to-release
      version:
        description: 'Version to promote (e.g., 0.0.1-alpha.42) - required for promotions'
        required: false
        type: string

env:
  IMAGE_NAME: ciyex-app
  REGISTRY: registry.apps-prod.us-east.in.hinisoft.com

jobs:
  extract-version:
    name: Extract Version from Gradle
    runs-on: [self-hosted, linux, x64]
    outputs:
      version: ${{ steps.version.outputs.version }}
      full_version: ${{ steps.version.outputs.full_version }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Extract version from build.gradle
        id: version
        run: |
          # Extract version from build.gradle (e.g., '0.0.1' -> '0.0.1')
          GRADLE_VERSION=$(grep "^version = " build.gradle | sed "s/version = '\(.*\)'/\1/" | sed 's/-SNAPSHOT//')
          # Create alpha version with run number: 0.0.1-alpha.13
          FULL_VERSION="${GRADLE_VERSION}-alpha.${{ github.run_number }}"
          echo "version=${GRADLE_VERSION}" >> $GITHUB_OUTPUT
          echo "full_version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Gradle version: ${GRADLE_VERSION}"
          echo "📦 Full version: ${FULL_VERSION}"

  pr-build:
    name: PR Build - Validate Docker Image
    if: github.event_name == 'pull_request'
    needs: [extract-version]
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build Docker image (no push)
        run: |
          VERSION="${{ needs.extract-version.outputs.full_version }}-nonprod"
          docker build --build-arg ENVIRONMENT=prod -t $REGISTRY/$IMAGE_NAME:$VERSION .
          echo "✅ PR image build successful: $REGISTRY/$IMAGE_NAME:${VERSION}"

  build-and-push:
    name: Build and Push to Prod Registry
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [extract-version]
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Login to Private Registry
        run: |
          echo "${{ secrets.PROD_REGISTRY_PASSWORD }}" | docker login $REGISTRY -u ${{ secrets.PROD_REGISTRY_USERNAME }} --password-stdin

      - name: Build and Push Docker Image with alpha tag
        run: |
          VERSION="${{ needs.extract-version.outputs.full_version }}"
          # Tag as alpha - initial build for internal testing
          docker build --build-arg ENVIRONMENT=prod \
            -t $REGISTRY/$IMAGE_NAME:${VERSION} \
            -t $REGISTRY/$IMAGE_NAME:alpha \
            .
          docker push $REGISTRY/$IMAGE_NAME:${VERSION}
          docker push $REGISTRY/$IMAGE_NAME:alpha
          echo "✅ Image pushed: $REGISTRY/$IMAGE_NAME:${VERSION}"

      - name: Update k8s manifest with new image version
        run: |
          VERSION="${{ needs.extract-version.outputs.full_version }}"
          sed -i "s|image: $REGISTRY/$IMAGE_NAME:.*|image: $REGISTRY/$IMAGE_NAME:${VERSION}|" k8s/overlays/dev/deployment-patch.yaml
          cat k8s/overlays/dev/deployment-patch.yaml | grep "image:"

      - name: Commit and push manifest update
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add k8s/overlays/dev/deployment-patch.yaml
          git diff --staged --quiet || git commit -m "Update dev image to ${{ needs.extract-version.outputs.full_version }} [skip ci]"
          git push

      - name: Output image details
        run: |
          echo "## 📦 Image Details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | $REGISTRY |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | $IMAGE_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ needs.extract-version.outputs.full_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | 🔬 Alpha (Internal Testing) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Promotion Path" >> $GITHUB_STEP_SUMMARY
          echo "1. **Alpha** (current) → Internal testing" >> $GITHUB_STEP_SUMMARY
          echo "2. **RC** → Release Candidate (QA/UAT)" >> $GITHUB_STEP_SUMMARY
          echo "3. **Release** → Production (0.0.1)" >> $GITHUB_STEP_SUMMARY

  promote-to-rc:
    name: Promote Alpha to RC
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'promote-to-rc'
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Validate version input
        run: |
          if [ -z "${{ github.event.inputs.version }}" ]; then
            echo "❌ Error: Version is required for promotion"
            echo "Please provide the version to promote (e.g., 0.0.1-alpha.42)"
            exit 1
          fi

      - name: Login to Private Registry
        run: |
          echo "${{ secrets.PROD_REGISTRY_PASSWORD }}" | docker login $REGISTRY -u ${{ secrets.PROD_REGISTRY_USERNAME }} --password-stdin

      - name: Promote alpha to rc
        run: |
          VERSION="${{ github.event.inputs.version }}"
          # Extract base version (0.0.1 from 0.0.1-alpha.42)
          BASE_VERSION=$(echo $VERSION | sed 's/-alpha\.[0-9]*//')
          BUILD_NUM=$(echo $VERSION | sed 's/.*-alpha\.//')
          RC_VERSION="${BASE_VERSION}-rc.${BUILD_NUM}"
          # Pull the alpha image and retag as rc
          docker pull $REGISTRY/$IMAGE_NAME:${VERSION}
          docker tag $REGISTRY/$IMAGE_NAME:${VERSION} $REGISTRY/$IMAGE_NAME:${RC_VERSION}
          docker tag $REGISTRY/$IMAGE_NAME:${VERSION} $REGISTRY/$IMAGE_NAME:rc
          docker push $REGISTRY/$IMAGE_NAME:${RC_VERSION}
          docker push $REGISTRY/$IMAGE_NAME:rc
          echo "✅ Image promoted to RC: $REGISTRY/$IMAGE_NAME:${RC_VERSION}"

      - name: Output promotion details
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BASE_VERSION=$(echo $VERSION | sed 's/-dev\.[0-9]*//')
          BUILD_NUM=$(echo $VERSION | sed 's/.*-dev\.//')
          RC_VERSION="${BASE_VERSION}-rc.${BUILD_NUM}"
          echo "## 🧪 RC Promotion Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | $REGISTRY |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | $IMAGE_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${RC_VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | 🧪 RC (Release Candidate) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Step" >> $GITHUB_STEP_SUMMARY
          echo "After QA testing passes, promote to **Release** (${BASE_VERSION}) for production." >> $GITHUB_STEP_SUMMARY

  promote-to-release:
    name: Promote RC to Release
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'promote-to-release'
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Validate version input
        run: |
          if [ -z "${{ github.event.inputs.version }}" ]; then
            echo "❌ Error: Version is required for promotion"
            echo "Please provide the RC version to promote (e.g., 0.0.1-rc.42)"
            exit 1
          fi

      - name: Login to Private Registry
        run: |
          echo "${{ secrets.PROD_REGISTRY_PASSWORD }}" | docker login $REGISTRY -u ${{ secrets.PROD_REGISTRY_USERNAME }} --password-stdin

      - name: Promote rc to release
        run: |
          VERSION="${{ github.event.inputs.version }}"
          # Extract base version (0.0.1 from 0.0.1-rc.42)
          BASE_VERSION=$(echo $VERSION | sed 's/-rc\.[0-9]*//')
          # Pull the rc image and retag as release (production)
          docker pull $REGISTRY/$IMAGE_NAME:${VERSION}
          docker tag $REGISTRY/$IMAGE_NAME:${VERSION} $REGISTRY/$IMAGE_NAME:${BASE_VERSION}
          docker tag $REGISTRY/$IMAGE_NAME:${VERSION} $REGISTRY/$IMAGE_NAME:latest
          docker push $REGISTRY/$IMAGE_NAME:${BASE_VERSION}
          docker push $REGISTRY/$IMAGE_NAME:latest
          echo "✅ Image promoted to release: $REGISTRY/$IMAGE_NAME:${BASE_VERSION}"

      - name: Output promotion details
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BASE_VERSION=$(echo $VERSION | sed 's/-rc\.[0-9]*//')
          echo "## 🚀 Release Promotion Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | $REGISTRY |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | $IMAGE_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${BASE_VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Release (Production Ready) |" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Notify Team
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, linux, x64]
    needs: [extract-version, build-and-push]

    steps:
      - name: Determine build status
        id: status
        run: |
          if [ "${{ needs.build-and-push.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "title=Published" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "title=Build Failed" >> $GITHUB_OUTPUT
          fi

      - name: Send Microsoft Teams notification
        run: |
          TEAMS_WEBHOOK="${{ secrets.TEAMS_WEBHOOK_URL }}"
          if [ -z "$TEAMS_WEBHOOK" ]; then
            echo "⚠️ TEAMS_WEBHOOK_URL secret not configured, skipping notification"
            exit 0
          fi
          
          STATUS_COLOR="good"
          if [ "${{ steps.status.outputs.status }}" == "failure" ]; then
            STATUS_COLOR="attention"
          fi
          
          curl -H "Content-Type: application/json" -d '{
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                "type": "AdaptiveCard",
                "version": "1.4",
                "body": [
                  {
                    "type": "TextBlock",
                    "size": "Large",
                    "weight": "Bolder",
                    "text": "${{ steps.status.outputs.emoji }} Ciyex Backend - v${{ needs.extract-version.outputs.full_version }} ${{ steps.status.outputs.title }}",
                    "style": "heading"
                  },
                  {
                    "type": "TextBlock",
                    "text": "Status: ${{ steps.status.outputs.status }}",
                    "color": "'"$STATUS_COLOR"'"
                  },
                  {
                    "type": "FactSet",
                    "facts": [
                      {"title": "Version", "value": "${{ needs.extract-version.outputs.full_version }}"},
                      {"title": "Image", "value": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.extract-version.outputs.full_version }}"},
                      {"title": "Stage", "value": "🔬 Alpha (Internal Testing)"},
                      {"title": "Pushed by", "value": "${{ github.actor }}"}
                    ]
                  }
                ],
                "actions": [
                  {
                    "type": "Action.OpenUrl",
                    "title": "View Workflow",
                    "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            }]
          }' "$TEAMS_WEBHOOK"
