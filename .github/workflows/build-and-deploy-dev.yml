name: Build & Deploy Ciyex App Dev

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ciyex-app
  REGISTRY: registry.apps-dev.in.hinisoft.com
  VERSION: v1.0.${{ github.run_number }}

jobs:
  pr-build:
    name: PR Build - Validate Docker Image
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build Docker image (no push)
        run: |
          docker build --build-arg ENVIRONMENT=dev -t $REGISTRY/$IMAGE_NAME:$VERSION .
          echo "✅ PR image build successful: $REGISTRY/$IMAGE_NAME:${VERSION}"

  build-and-deploy:
    name: Build and Deploy to Dev
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Login to Private Registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login $REGISTRY -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

      - name: Build and Push Docker Image
        run: |
          docker build --build-arg ENVIRONMENT=dev -t $REGISTRY/$IMAGE_NAME:dev -t $REGISTRY/$IMAGE_NAME:$VERSION .
          docker push $REGISTRY/$IMAGE_NAME:dev
          docker push $REGISTRY/$IMAGE_NAME:$VERSION
          echo "✅ Image pushed: $REGISTRY/$IMAGE_NAME:$VERSION"

      - name: Commit and Push Image Tag Update
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git pull --rebase origin main
          sed -i "s|image: registry.apps-dev.in.hinisoft.com/ciyex-app:.*|image: $REGISTRY/$IMAGE_NAME:$VERSION|" k8s/overlays/dev/deployment-patch.yaml
          cat k8s/overlays/dev/deployment-patch.yaml
          git add k8s/overlays/dev/deployment-patch.yaml
          git commit -m "Update dev image to $VERSION [skip ci]" || echo "No changes to commit"
          git push

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Create namespace and secrets
        run: |
          kubectl create namespace ciyex-dev --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry regcred \
            --docker-server=$REGISTRY \
            --docker-username=${{ secrets.REGISTRY_USERNAME }} \
            --docker-password=${{ secrets.REGISTRY_PASSWORD }} \
            -n ciyex-dev \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -k k8s/overlays/dev

      - name: Verify deployment
        id: verify
        run: |
          if kubectl rollout status deployment/dev-ciyex-app -n ciyex-dev --timeout=5m; then
            echo "deployment_status=success" >> $GITHUB_OUTPUT
          else
            echo "deployment_status=failed" >> $GITHUB_OUTPUT
            kubectl get pods -n ciyex-dev -l app=ciyex-app -o wide
            kubectl logs -n ciyex-dev -l app=ciyex-app --tail=50 || true
            exit 1
          fi
          kubectl get pods -n ciyex-dev -l app=ciyex-app -o wide

  notify:
    name: Notify Team
    if: always() && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, x64]
    needs: [build-and-deploy]

    steps:
      - name: Determine deployment status
        id: status
        run: |
          if [ "${{ needs.build-and-deploy.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          fi

      - name: Send Microsoft Teams notification
        run: |
          TEAMS_WEBHOOK="${{ secrets.TEAMS_WEBHOOK_URL }}"
          if [ -z "$TEAMS_WEBHOOK" ]; then
            echo "⚠️ TEAMS_WEBHOOK_URL secret not configured, skipping notification"
            exit 0
          fi
          
          STATUS_COLOR="good"
          if [ "${{ steps.status.outputs.status }}" == "failure" ]; then
            STATUS_COLOR="attention"
          fi
          
          curl -H "Content-Type: application/json" -d '{
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                "type": "AdaptiveCard",
                "version": "1.4",
                "body": [
                  {
                    "type": "TextBlock",
                    "size": "Large",
                    "weight": "Bolder",
                    "text": "${{ steps.status.outputs.emoji }} Ciyex Backend Dev Deployment",
                    "style": "heading"
                  },
                  {
                    "type": "TextBlock",
                    "text": "Status: ${{ steps.status.outputs.status }}",
                    "color": "'"$STATUS_COLOR"'"
                  },
                  {
                    "type": "FactSet",
                    "facts": [
                      {"title": "Environment", "value": "Dev"},
                      {"title": "Version", "value": "${{ env.VERSION }}"},
                      {"title": "Image", "value": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}"},
                      {"title": "Deployed by", "value": "${{ github.actor }}"},
                      {"title": "URL", "value": "https://ciyex-api.apps-dev.in.hinisoft.com"}
                    ]
                  }
                ],
                "actions": [
                  {
                    "type": "Action.OpenUrl",
                    "title": "View Workflow",
                    "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  },
                  {
                    "type": "Action.OpenUrl",
                    "title": "View API",
                    "url": "https://ciyex-api.apps-dev.in.hinisoft.com/api"
                  }
                ]
              }
            }]
          }' "$TEAMS_WEBHOOK"
